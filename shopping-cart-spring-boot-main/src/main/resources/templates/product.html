<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8"> <!-- ✅ FIXED encoding -->
    <title>Products</title>

    <!-- Bootstrap (optional but recommended) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<section>

    <!-- 🔍 SEARCH BAR -->
    <div class="container-fluid bg-primary p-4 mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <form action="/products" method="get">
                    <div class="input-group">
                        <input type="text" class="form-control" name="ch" placeholder="Search product...">
                        <button class="btn btn-light text-dark ms-2">
                            <i class="fa-solid fa-magnifying-glass"></i> Search
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 🛍️ MAIN CONTENT -->
    <div class="container-fluid mt-3">
        <div class="row">

            <!-- 📂 CATEGORY -->
            <div class="col-md-2">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <p class="fs-5">Category</p>

                        <a href="/products"
                           th:classappend="${paramValue==''} ? 'active' : ''"
                           class="list-group-item list-group-item-action">
                            All
                        </a>

                        <a th:each="c : ${categories}"
                           th:href="@{'/products?category=' + ${c.name}}"
                           th:classappend="${paramValue == c.name} ? 'active' : ''"
                           class="list-group-item list-group-item-action">
                            [[${c.name}]]
                        </a>

                    </div>
                </div>
            </div>

            <!-- 🛒 PRODUCTS -->
            <div class="col-md-10">
                <div class="card">
                    <div class="card-body">

                        <p class="fs-3 text-center">Products</p>

                        <div class="row">

                            <!-- ✅ PRODUCT LIST -->
                            <th:block th:if="${productsSize > 0}">
                                <div class="col-md-3 mt-3" th:each="p : ${products}">
                                    <div class="card text-center shadow-sm">

                                        <img th:src="@{'/img/product_img/' + ${p.image}}"
                                             width="150" height="150"
                                             class="mx-auto mt-3"/>

                                        <div class="card-body">
                                            <p class="fs-5">[[${p.title}]]</p>

                                            <p class="fw-bold">

                                                <!-- ✅ ₹ DIRECT FIX -->
                                                ₹ [[${p.discountPrice}]]

                                                <br>

                                                <span class="text-decoration-line-through text-secondary">
                                                    ₹ [[${p.price}]]
                                                </span>

                                                <br>

                                                <span class="text-success">
                                                    [[${p.discount}]]% off
                                                </span>

                                            </p>

                                            <a th:href="@{'/product/' + ${p.id}}"
                                               class="btn btn-primary">
                                                View Details
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </th:block>

                            <!-- ❌ NO PRODUCTS -->
                            <th:block th:unless="${productsSize > 0}">
                                <p class="fs-4 text-center text-danger mt-4">
                                    Product not available
                                </p>
                            </th:block>

                        </div>
                    </div>
                </div>

                <!-- 📄 PAGINATION -->
                <div class="row mt-3">
                    <div class="col-md-4">
                        Total Products : [[${totalElements}]]
                    </div>

                    <div class="col-md-6">
                        <th:block th:if="${productsSize > 0}">
                            <nav>
                                <ul class="pagination">

                                    <!-- ⬅️ PREVIOUS -->
                                    <li class="page-item"
                                        th:classappend="${isFirst} ? 'disabled' : ''">
                                        <a class="page-link"
                                           th:href="@{'/products?pageNo=' + ${pageNo-1}}">
                                            &laquo;
                                        </a>
                                    </li>

                                    <!-- 🔢 PAGE NUMBERS -->
                                    <li th:each="i : ${#numbers.sequence(1, totalPages)}"
                                        class="page-item"
                                        th:classappend="${pageNo+1 == i} ? 'active' : ''">

                                        <a class="page-link"
                                           th:href="@{'/products?pageNo=' + ${i-1}}">
                                            [[${i}]]
                                        </a>
                                    </li>

                                    <!-- ➡️ NEXT -->
                                    <li class="page-item"
                                        th:classappend="${isLast} ? 'disabled' : ''">
                                        <a class="page-link"
                                           th:href="@{'/products?pageNo=' + ${pageNo+1}}">
                                            &raquo;
                                        </a>
                                    </li>

                                </ul>
                            </nav>
                        </th:block>
                    </div>
                </div>

            </div>
        </div>
    </div>

</section>
</body>
</html>
